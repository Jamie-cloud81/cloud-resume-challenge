<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jamie's Cloud Resume</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    h1 {
      margin-bottom: 0.5rem;
    }
    p {
      margin: 0.5rem 0;
      color: #cbd5f5;
    }
    .counter {
      margin-top: 1.5rem;
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jamie Jackson</h1>
    <p>Entry-Level IT / Cloud Engineer</p>

    <div class="counter">
      Visitors: <span id="visitor-count">Loading...</span>
    </div>
  </div>

  <script>
    fetch("https://hmrm8uhill.execute-api.us-east-2.amazonaws.com/count")
      .then(res => res.json())
      .then(data => {
        document.getElementById("visitor-count").innerText = data.count;
      })
      .catch(err => {
        console.error(err);
        document.getElementById("visitor-count").innerText = "Error";
      });
  </script>
</body>
</html>
